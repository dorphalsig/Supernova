name: Update File List Gist

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Create file list
      run: |
        find . -type f -not -path './.git/*' | sort > file_list.txt

    - name: Update Gist
      env:
        GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
      run: |
        FILE_LIST_CONTENT=$(cat file_list.txt)
        
        cat > gist_payload.json << EOF
        {
          "description": "File list for ${{ github.repository }}",
          "files": {
            "file_list.txt": {
              "content": $(echo "$FILE_LIST_CONTENT" | jq -Rs .)
            }
          }
        }
        EOF
        
        curl -X PATCH \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          -d @gist_payload.json \
          "https://api.github.com/gists/$GIST_ID"
