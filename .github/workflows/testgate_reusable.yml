name: _reusable TestGate

on:
  workflow_call:
    inputs:
      java_version:
        type: string
        default: "21"
      gradle_task:
        type: string
        default: "check"

jobs:
  build-and-collect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      - uses: gradle/actions/setup-gradle@v4

      - name: Gradle ${{ inputs.gradle_task }}
        run: ./gradlew --no-daemon --stacktrace ${{ inputs.gradle_task }}

      - name: Ensure TestGate.json exists
        shell: bash
        run: |
          set -euo pipefail
          test -f build/TestGate.json || { echo "::error::build/TestGate.json not found"; ls -la build || true; exit 1; }

      - name: Upload TestGate.json
        uses: actions/upload-artifact@v4
        with:
          name: TestGate.json
          path: build/TestGate.json
          if-no-files-found: error
          retention-days: 14

      # Build a matrix of {module, name, failed, findings, tolerance}
      - name: Collect audits → matrix (module × name)
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          # Input is a LIST of AuditResult objects:
          # data class AuditResult(val module: String, val name: String, val findings: List<...>, val tolerance: Int, val findingCount: Number, val status: Status)
          jq -c '[
            .[] 
            | {
                module: (.module // "unknown"),
                name:   (.name),
                failed: ((.status|tostring|ascii_downcase) == "fail"),
                findings: (.findingCount // ((.findings|length)? // 0)),
                tolerance: (.tolerance // 0)
              }
          ]' build/TestGate.json | tee audits-matrix.json
          echo "matrix=$(cat audits-matrix.json)" >> "$GITHUB_OUTPUT"

      - name: Summary (module × audit table)
        shell: bash
        run: |
          {
            echo "## TestGate summary"
            echo ""
            echo "| Module | Audit | Status | Findings | Tol |"
            echo "|---|---|---:|---:|---:|"
          } >> "$GITHUB_STEP_SUMMARY"
          jq -r '
            .[] | 
            "| \(.module) | \(.name) | \((if ((.status|tostring|ascii_downcase) == \"fail\") then \"FAIL\" else \"PASS\" end)) | \(.findingCount // ((.findings|length)? // 0)) | \(.tolerance // 0) |"
          ' build/TestGate.json >> "$GITHUB_STEP_SUMMARY"

  per-audit:
    needs: build-and-collect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        item: ${{ fromJSON(needs.build-and-collect.outputs.matrix) }}
    name: ${{ matrix.item.module }} / ${{ matrix.item.name }}
    steps:
      - name: Assert ${{ matrix.item.module }} / ${{ matrix.item.name }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Module:   ${{ matrix.item.module }}"
          echo "Audit:    ${{ matrix.item.name }}"
          echo "Findings: ${{ matrix.item.findings }}"
          echo "Tol:      ${{ matrix.item.tolerance }}"
          if [[ "${{ matrix.item.failed }}" == "true" ]]; then
            echo "::error::Audit failed."
            exit 1
          fi
          echo "PASS"