name: Update Gist With File Structure

on:
  push:
    branches:
      - master   # Your default branch

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate file tree
        run: |
          tree -a -I '.git|build|.idea|node_modules' > file_structure.txt

      - name: Update Gist
        env:
          GIST_ID: 52c9f181e73a65e61a5770021c695e61
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Create a proper JSON payload with escaped content
          jq -n --rawfile content file_structure.txt '{
            "files": {
              "file_structure.txt": {
                "content": $content
              }
            }
          }' > payload.json
          
          # Send the update to GitHub
          curl -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/gists/$GIST_ID \
            -d @payload.json