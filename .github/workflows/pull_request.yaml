name: Run Tests & Auto Rebase
on:
  pull_request:
    branches: [ master ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Tests
        id: gradle_test
        run: ./gradlew test > test_output.log 2>&1 || true

      - name: Handle PR Workflow
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          MERGE_TOKEN: ${{ secrets.MERGE_TOKEN }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          FAILURE_GIST_ID: ${{ secrets.FAILURE_GIST_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.head_ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 .github/workflows/scripts/handle_failures.py
