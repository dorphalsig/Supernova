name: Quality Gates

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

  push:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  auto-rebase-if-needed:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      rebased: ${{ steps.rebase.outputs.rebased_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: rebase
        uses: peter-evans/rebase@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          head: ${{ github.repository_owner }}:${{ github.head_ref }}
  test:
    needs: auto-rebase-if-needed
    runs-on: ubuntu-latest
    steps:
      - name: this-sucks
        run: echo "${{ needs.auto-rebase-if-needed.outputs.rebased_count }}"
  debug-rebase-output:
    needs: auto-rebase-if-needed
    runs-on: ubuntu-latest
    steps:
      - run: echo "REB = ${{ needs.auto-rebase-if-needed.outputs.rebased_count }}"

  generate-results:
    needs: auto-rebase-if-needed
    if: |
      (github.event_name == 'pull_request' && needs.auto-rebase-if-needed.outputs.rebased_count == '1') ||
      (github.event_name == 'push' && !startsWith(github.head_commit.message, 'Merge pull request'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash ./gradlew detekt ktlintCheck jacocoMergedReport :app:test
      - uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: app/build/reports/check-results.json

  check-compile-errors:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          ERRORS=$(jq '.compileErrors' check-results.json)
          if [ "$ERRORS" != "0" ]; then
            echo "::error::Compile errors found"
            exit 1
          fi

  check-banned:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          FOUND=$(jq '.banned' check-results.json)
          if [ "$FOUND" != "0" ]; then
            echo "::error::Banned usages found"
            exit 1
          fi

  check-coroutines:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          ISSUES=$(jq '.coroutines' check-results.json)
          if [ "$ISSUES" != "0" ]; then
            echo "::error::Coroutine misuse found"
            exit 1
          fi

  check-ignored:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          IGNORED=$(jq '.ignoredTests' check-results.json)
          if [ "$IGNORED" != "0" ]; then
            echo "::error::Ignored tests found"
            exit 1
          fi

  check-test-structure:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          ISSUES=$(jq '.testStructure' check-results.json)
          if [ "$ISSUES" != "0" ]; then
            echo "::error::Test structure issues found"
            exit 1
          fi

  check-fails:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          FAILURES=$(jq '.testFailures' check-results.json)
          if [ "$FAILURES" != "0" ]; then
            echo "::error::Tests failed"
            exit 1
          fi

  check-coverage:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          COVERAGE=$(jq '.coverage' check-results.json)
          if (( $(echo "$COVERAGE < 0.80" | bc -l) )); then
            echo "::error::Coverage below threshold: $COVERAGE"
            exit 1
          fi

  check-detekt:
    needs: generate-results
    if: needs.generate-results.result == '1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results
      - run: |
          DETEKT=$(jq '.detektIssues' check-results.json)
          if [ "$DETEKT" != "0" ]; then
            echo "::error::Detekt issues found"
            exit 1
          fi

  enable-auto-merge:
    needs:
      - generate-results
      - check-compile-errors
      - check-banned
      - check-coroutines
      - check-ignored
      - check-test-structure
      - check-fails
      - check-coverage
      - check-detekt
    if: github.event_name == 'pull_request' && success() && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: rebase
          pull-request: ${{ github.event.pull_request.number }}
