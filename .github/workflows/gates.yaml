# File: .github/workflows/gates.yaml
name: Quality Gates

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-rebase-if-needed:
    runs-on: ubuntu-latest
    outputs:
      rebased: ${{ steps.check.outputs.rebased }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: rebase
        name: Attempt rebase onto main
        uses: peter-evans/rebase@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          head: ${{ github.repository_owner }}:${{ github.head_ref }}

      - id: check
        run: echo "rebased=${{ steps.rebase.outputs.rebased }}" >> "$GITHUB_OUTPUT"

  generate-results:
    needs: auto-rebase-if-needed
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate check-results.json
        run: bash ./gradlew detekt ktlintCheck jacocoMergedReport :app:test

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: app/build/reports/check-results.json

  check-compile-errors:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Validate compile success
        run: |
          SUCCESS=$(jq '.compileErrors.success' check-results.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Compilation errors detected. Build is broken."
            exit 1
          fi

  check-banned:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Parse banned import violations
        run: |
          SUCCESS=$(jq '.checkBanned.success' check-results.json)
          if [ "$SUCCESS" != "true" ]; then
            jq -r '.checkBanned.violations[] | "::error file=\(.file)::Banned import usage is disallowed."' check-results.json
            exit 1
          fi

  check-coroutines:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Validate coroutine check
        run: |
          SUCCESS=$(jq '.checkCoroutines.success' check-results.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Coroutines usage check failed. Only runTest + MockK allowed."
            exit 1
          fi

  check-ignored:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Validate ignored usage
        run: |
          SUCCESS=$(jq '.checkIgnored.success' check-results.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Ignored usage detected outside instrumentation tests."
            exit 1
          fi

  check-test-structure:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Parse test structure violations
        run: |
          SUCCESS=$(jq '.checkTestStructure.success' check-results.json)
          if [ "$SUCCESS" != "true" ]; then
            jq -r '.checkTestStructure.violations[] | "::error::Test structure issue: \(.remediation)"' check-results.json
            exit 1
          fi

  check-fails:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Validate test failure count
        run: |
          FAILS=$(jq '.checkFails.failedCount' check-results.json)
          THRESH=$(jq '.checkFails.maxFails' check-results.json)
          echo "Test failures: $FAILS / Max allowed: $THRESH"
          if [ "$FAILS" -gt "$THRESH" ]; then
            echo "::error::Too many test failures ($FAILS > $THRESH)"
            exit 1
          fi

  check-coverage:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Validate coverage
        run: |
          SUCCESS=$(jq '.checkCoverage.success' check-results.json)
          COV=$(jq '.checkCoverage.coverage' check-results.json)
          THRESH=$(jq '.checkCoverage.threshold' check-results.json)
          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Coverage $COV% below threshold $THRESH%"
            exit 1
          fi

  check-detekt:
    needs: generate-results
    if: ${{ needs.auto-rebase-if-needed.outputs.rebased == '0' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: check-results

      - name: Validate Detekt
        run: |
          SUCCESS=$(jq '.checkDetekt.success' check-results.json)
          if [ "$SUCCESS" != "true" ]; then
            jq -r '.checkDetekt.errors[] | "::error::" + .' check-results.json
            exit 1
          fi

  enable-auto-merge:
    needs:
      - check-banned
      - check-test-structure
      - check-fails
      - check-compile-errors
      - check-coroutines
      - check-ignored
      - check-coverage
      - check-detekt
      - generate-results
    if: ${{ success() && github.event.pull_request.merged == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Enable GitHub auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: rebase
          pull-request: ${{ github.event.pull_request.number }}
