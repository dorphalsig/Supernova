name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Run checks
        run: ./gradlew detekt ktlintCheck jacocoMergedReport --no-daemon
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/detekt
            **/build/reports/ktlint
            build/reports/jacoco
