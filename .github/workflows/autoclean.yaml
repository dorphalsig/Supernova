name: Auto-Clean Push (master-ac → master)

on:
  push:
    branches: [master-ac]  # Only trigger when pushing to master-ac

jobs:
  clean-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout master-ac
      uses: actions/checkout@v4
      with:
        ref: master-ac
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
    
    - name: Setup Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
    
    - name: Create clean version
      run: |
        # Switch to master branch (create if doesn't exist)
        git checkout -B master
        
        # Remove gradle cache and build artifacts
        echo "Cleaning gradle cache and build artifacts..."
        rm -rf gradle-cache/
        rm -rf .gradle/
        rm -rf build/
        rm -rf */build/
        rm -rf **/*.log
        
        # Remove any other files you don't want in master
        # Add more rm commands here if needed
        
        # Stage all changes (including deletions)
        git add -A
        
        # Only commit if there are changes
        if ! git diff --cached --quiet; then
          git commit -m "Auto-clean: Remove gradle cache and build artifacts from master-ac@${GITHUB_SHA:0:7}"
        fi
    
    - name: Push to master
      run: |
        git push origin master --force
        echo "✅ Clean version pushed to master"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Summary
      run: |
        echo "🎉 Workflow completed successfully!"
        echo "📝 Changes from master-ac have been cleaned and pushed to master"
        echo "🗑️  Removed: gradle-cache/, .gradle/, build/ directories"
