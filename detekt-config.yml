config:
  validation: true
  warningsAsErrors: false  # Changed to false

output-reports:
  active: true
  exclude: [ ]

processors: { active: true }
console-reports: { active: true }

testgate:
  RequireHarnessAnnotationOnTests:
    active: true
    includes: [ '**/src/test/**', '**/src/androidTest/**' ]

style:
  MaxLineLength: { active: false }
  UnusedImports: { active: true }
  UnusedParameter: { active: true }
  UnusedPrivateClass: { active: true }
  UnusedPrivateMember: { active: true }
  UnusedPrivateProperty: { active: true }
  ForbiddenMethodCall:
    active: true
    includes: [ '**/src/test/**', '**/src/androidTest/**' ]
    methods:
      - 'kotlinx.coroutines.runBlocking'
      - 'java.lang.Thread.sleep'

complexity:
  LongParameterList: { active: true, functionThreshold: 6 }
  LongMethod: { active: true, threshold: 60 }
  CyclomaticComplexMethod: { active: true, threshold: 15 }  # Renamed from ComplexMethod
  TooManyFunctions: { active: true, thresholdInClasses: 15 }
  NestedBlockDepth: { active: true, threshold: 4 }

coroutines:
  InjectDispatcher:
    active: true
    excludes: [ '**/src/test/**', '**/src/androidTest/**' ]
    dispatcherNames: [ 'IO', 'Default', 'Unconfined' ]

# Disable everything else
naming: { active: false }
comments: { active: false }
performance: { active: false }
exceptions: { active: false }
empty-blocks: { active: false }